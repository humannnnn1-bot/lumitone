<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Maskable icon: Fano plane scaled to 80% safe zone, on app background. -->
  <rect width="32" height="32" fill="#0a0a12" />
  <g transform="translate(16 16) scale(0.8) translate(-16 -16)">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Each Fano line is colored by its orthogonal dual point in GF(2)^3. -->
      <circle cx="16" cy="16" r="6" stroke="#ffffff" stroke-width="1.2" />

      <line x1="16" y1="4" x2="5.6" y2="22" stroke="#00ff00" stroke-width="1.2" />
      <line x1="16" y1="4" x2="26.4" y2="22" stroke="#0000ff" stroke-width="1.2" />
      <line x1="5.6" y1="22" x2="26.4" y2="22" stroke="#ff0000" stroke-width="1.2" />

      <line x1="16" y1="4" x2="16" y2="22" stroke="#00ffff" stroke-width="1.2" />
      <line x1="5.6" y1="22" x2="21.2" y2="13" stroke="#ffff00" stroke-width="1.2" />
      <line x1="26.4" y1="22" x2="10.8" y2="13" stroke="#ff00ff" stroke-width="1.2" />
    </g>

    <g stroke="#0a0a12" stroke-width="1.1">
      <circle cx="16" cy="4" r="2.2" fill="#ff0000" />
      <circle cx="5.6" cy="22" r="2.2" fill="#0000ff" />
      <circle cx="26.4" cy="22" r="2.2" fill="#00ff00" />
      <circle cx="10.8" cy="13" r="2.2" fill="#ff00ff" />
      <circle cx="21.2" cy="13" r="2.2" fill="#ffff00" />
      <circle cx="16" cy="22" r="2.2" fill="#00ffff" />
      <circle cx="16" cy="16" r="2.2" fill="#ffffff" />
    </g>
  </g>
</svg>
