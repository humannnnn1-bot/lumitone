<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Maskable icon: Fano plane scaled to 80% safe zone, on app background -->
  <rect width="32" height="32" fill="#0a0a12"/>
  <g transform="translate(16 16) scale(0.8) translate(-16 -16)">
    <!-- Triangle edges — colored by opposite vertex (dual point) -->
    <line x1="16" y1="4" x2="5.6" y2="22" stroke="#40ff40" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="16" y1="4" x2="26.4" y2="22" stroke="#4040ff" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="5.6" y1="22" x2="26.4" y2="22" stroke="#ff4040" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Medians — colored by midpoint (self-dual) -->
    <line x1="16" y1="4" x2="16" y2="22" stroke="#40ffff" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="5.6" y1="22" x2="21.2" y2="13" stroke="#ffff40" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="26.4" y1="22" x2="10.8" y2="13" stroke="#ff40ff" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Inscribed circle (self-dual line) -->
    <circle cx="16" cy="16" r="5.2" fill="none" stroke="#ffffff" stroke-width="1.2"/>

    <!-- Vertex dots: RGB at triangle vertices -->
    <circle cx="16" cy="4" r="2.2" fill="#ff4040"/>
    <circle cx="5.6" cy="22" r="2.2" fill="#4040ff"/>
    <circle cx="26.4" cy="22" r="2.2" fill="#40ff40"/>

    <!-- Midpoint dots: XOR of adjacent vertices -->
    <circle cx="10.8" cy="13" r="2.2" fill="#ff40ff"/>
    <circle cx="21.2" cy="13" r="2.2" fill="#ffff40"/>
    <circle cx="16" cy="22" r="2.2" fill="#40ffff"/>

    <!-- Center dot: White -->
    <circle cx="16" cy="16" r="2.2" fill="#ffffff"/>
  </g>
</svg>
