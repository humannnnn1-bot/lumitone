<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>CHROMALUM</title>
  <!-- Small-size Fano plane mark for CHROMALUM. -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="#0a0a12" />
  <rect x="1.5" y="1.5" width="29" height="29" rx="6.5" fill="none" stroke="#242438" />
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Each Fano line is colored by its orthogonal dual point in GF(2)^3. -->
    <circle cx="16" cy="16" r="5.25" stroke="#ffffff" stroke-width="1" />
    <line x1="16" y1="5.5" x2="6.91" y2="21.25" stroke="#00ff00" stroke-width="1.2" />
    <line x1="16" y1="5.5" x2="25.09" y2="21.25" stroke="#0000ff" stroke-width="1.2" />
    <line x1="6.91" y1="21.25" x2="25.09" y2="21.25" stroke="#ff0000" stroke-width="1.2" />
    <line x1="16" y1="5.5" x2="16" y2="21.25" stroke="#00ffff" stroke-width="1.2" />
    <line x1="6.91" y1="21.25" x2="20.55" y2="13.38" stroke="#ffff00" stroke-width="1.2" />
    <line x1="25.09" y1="21.25" x2="11.45" y2="13.38" stroke="#ff00ff" stroke-width="1.2" />
  </g>
  <g stroke="#0a0a12" stroke-width="1.1">
    <circle cx="16" cy="5.5" r="2.45" fill="#ff0000" />
    <circle cx="6.91" cy="21.25" r="2.45" fill="#0000ff" />
    <circle cx="25.09" cy="21.25" r="2.45" fill="#00ff00" />
    <circle cx="11.45" cy="13.38" r="2.35" fill="#ff00ff" />
    <circle cx="20.55" cy="13.38" r="2.35" fill="#ffff00" />
    <circle cx="16" cy="21.25" r="2.35" fill="#00ffff" />
    <circle cx="16" cy="16" r="2.35" fill="#ffffff" />
  </g>
</svg>
