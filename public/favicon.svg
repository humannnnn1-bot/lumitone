<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>CHROMALUM</title>
  <!-- Small-size Fano plane mark for CHROMALUM. -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="#0a0a12"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="6.5" fill="none" stroke="#242438"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Each Fano line is colored by its orthogonal dual point in GF(2)^3. -->
    <line x1="16" y1="5.5" x2="6" y2="23" stroke="#00ff00" stroke-width="1.25"/>
    <line x1="16" y1="5.5" x2="26" y2="23" stroke="#0000ff" stroke-width="1.4"/>
    <line x1="6" y1="23" x2="26" y2="23" stroke="#ff0000" stroke-width="1.25"/>
    <line x1="16" y1="5.5" x2="16" y2="23" stroke="#00ffff" stroke-width="1.15"/>
    <line x1="6" y1="23" x2="21" y2="14" stroke="#ffff00" stroke-width="1.15"/>
    <line x1="26" y1="23" x2="11" y2="14" stroke="#ff00ff" stroke-width="1.15"/>
    <circle cx="16" cy="16" r="5" stroke="#ffffff" stroke-width="1"/>
  </g>
  <g stroke="#0a0a12" stroke-width="1.1">
    <circle cx="16" cy="5.5" r="2.6" fill="#ff0000"/>
    <circle cx="6" cy="23" r="2.6" fill="#0000ff"/>
    <circle cx="26" cy="23" r="2.6" fill="#00ff00"/>
    <circle cx="11" cy="14" r="2.5" fill="#ff00ff"/>
    <circle cx="21" cy="14" r="2.5" fill="#ffff00"/>
    <circle cx="16" cy="23" r="2.5" fill="#00ffff"/>
    <circle cx="16" cy="16" r="2.5" fill="#ffffff"/>
  </g>
</svg>
